<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家庭智能点菜系统-带记录发微信</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:"微软雅黑",sans-serif;}
        body{background:#f5f7fa;padding:15px;}
        .title{text-align:center;font-size:24px;color:#ff5722;font-weight:bold;margin-bottom:15px;}
        .nav{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:15px;}
        .nav-item{padding:6px 14px;background:#fff;border-radius:20px;border:1px solid #eee;font-size:14px;}
        .nav-item.active{background:#ff5722;color:#fff;border-color:#ff5722;}
        .food-list{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:15px;}
        .food-item{background:#fff;border-radius:12px;padding:12px;box-shadow:0 2px 6px #00000010;}
        .food-name{font-size:15px;font-weight:bold;margin-bottom:4px;}
        .food-price{color:#ff5722;margin-bottom:6px;}
        .num-box{display:flex;align-items:center;gap:8px;}
        .num-btn{width:26px;height:26px;border-radius:50%;border:none;background:#ff5722;color:#fff;font-size:16px;}
        .order-box,.record-box{background:#fff;border-radius:12px;padding:15px;box-shadow:0 2px 6px #00000010;margin-bottom:15px;}
        .order-title{font-size:17px;font-weight:bold;margin-bottom:10px;}
        .total{font-size:19px;color:#ff5722;font-weight:bold;margin-top:10px;}
        .btn{width:100%;padding:12px;border:none;border-radius:8px;font-size:16px;margin-top:10px;}
        .btn-wechat{background:#07c160;color:#fff;}
        .btn-clear{background:#999;color:#fff;margin-top:8px;}
        .record-item{padding:8px;border-bottom:1px solid #eee;font-size:14px;}
        .tab{display:flex;gap:10px;margin-bottom:15px;}
        .tab-btn{flex:1;text-align:center;padding:8px;background:#fff;border-radius:8px;}
        .tab-btn.active{background:#ff5722;color:#fff;}
        .hide{display:none;}
    </style>
</head>
<body>
    <div class="title">🏠 家庭智能点菜系统</div>

    <!-- 切换标签：点菜 / 点菜记录 -->
    <div class="tab">
        <div class="tab-btn active" onclick="switchTab('order')">在线点菜</div>
        <div class="tab-btn" onclick="switchTab('record')">点菜记录</div>
    </div>

    <!-- 点菜页面 -->
    <div id="orderPage">
        <!-- 分类导航 -->
        <div class="nav">
            <div class="nav-item active" onclick="switchCat('all')">全部</div>
            <div class="nav-item" onclick="switchCat('meat')">荤菜</div>
            <div class="nav-item" onclick="switchCat('veg')">素菜</div>
            <div class="nav-item" onclick="switchCat('soup')">汤品</div>
            <div class="nav-item" onclick="switchCat('snack')">小吃</div>
            <div class="nav-item" onclick="switchCat('drink')">饮品</div>
        </div>

        <!-- 菜品列表 -->
        <div class="food-list" id="foodList"></div>

        <!-- 已点菜单 -->
        <div class="order-box">
            <div class="order-title">📋 已点菜品</div>
            <div id="orderList"></div>
            <div class="total">合计：¥<span id="totalPrice">0</span></div>
            <button class="btn btn-wechat" onclick="copyToWechat()">📲 复制清单发微信</button>
            <button class="btn btn-clear" onclick="submitOrder()">✅ 确认下单保存记录</button>
            <button class="btn btn-clear" onclick="clearCart()">清空点菜</button>
        </div>
    </div>

    <!-- 点菜记录页面 -->
    <div id="recordPage" class="hide">
        <div class="record-box">
            <div class="order-title">📜 历史点菜记录</div>
            <div id="recordList"></div>
            <button class="btn btn-clear" onclick="clearAllRecord()">清空所有记录</button>
        </div>
    </div>

<script>
// 菜品数据 可自行修改增删
const foodData = [
    {name:"红烧肉",price:38,cat:"meat"},
    {name:"可乐鸡翅",price:32,cat:"meat"},
    {name:"红烧排骨",price:45,cat:"meat"},
    {name:"番茄炒蛋",price:18,cat:"veg"},
    {name:"清炒时蔬",price:15,cat:"veg"},
    {name:"凉拌黄瓜",price:12,cat:"veg"},
    {name:"冬瓜排骨汤",price:28,cat:"soup"},
    {name:"紫菜蛋花汤",price:10,cat:"soup"},
    {name:"炸薯条",price:16,cat:"snack"},
    {name:"蛋挞",price:18,cat:"snack"},
    {name:"可乐",price:5,cat:"drink"},
    {name:"果汁",price:8,cat:"drink"}
];

let cart = {};
let nowCat = "all";
let nowTab = "order";

// 初始化读取本地记录
let orderRecord = JSON.parse(localStorage.getItem('familyOrderRecord')) || [];

// 切换标签页
function switchTab(tab){
    nowTab = tab;
    document.querySelectorAll(".tab-btn").forEach(el=>el.classList.remove("active"));
    event.target.classList.add("active");
    if(tab==='order'){
        document.getElementById("orderPage").classList.remove("hide");
        document.getElementById("recordPage").classList.add("hide");
    }else{
        document.getElementById("orderPage").classList.add("hide");
        document.getElementById("recordPage").classList.remove("hide");
        renderRecord();
    }
}

// 渲染菜品
function renderFood(){
    let html = "";
    foodData.forEach((item,idx)=>{
        if(nowCat!=='all' && item.cat!==nowCat) return;
        let num = cart[idx] || 0;
        html += `
        <div class="food-item">
            <div class="food-name">${item.name}</div>
            <div class="food-price">¥${item.price}</div>
            <div class="num-box">
                <button class="num-btn" onclick="changeNum(${idx},-1)">-</button>
                <span>${num}</span>
                <button class="num-btn" onclick="changeNum(${idx},1)">+</button>
            </div>
        </div>
        `;
    });
    document.getElementById("foodList").innerHTML = html;
}

// 修改数量
function changeNum(idx,step){
    if(!cart[idx]) cart[idx] = 0;
    cart[idx] += step;
    if(cart[idx]<0) cart[idx] = 0;
    renderFood();
    renderOrder();
}

// 渲染订单
function renderOrder(){
    let orderHtml = "";
    let total = 0;
    for(let idx in cart){
        let num = cart[idx];
        if(num<=0) continue;
        let item = foodData[idx];
        let sum = item.price * num;
        total += sum;
        orderHtml += `<div>${item.name} × ${num} = ¥${sum}</div>`;
    }
    document.getElementById("orderList").innerHTML = orderHtml || "暂无点菜";
    document.getElementById("totalPrice").innerText = total;
}

// 切换分类
function switchCat(cat){
    nowCat = cat;
    document.querySelectorAll(".nav-item").forEach(el=>el.classList.remove("active"));
    event.target.classList.add("active");
    renderFood();
}

// 生成微信清单文本
function getOrderText(){
    let text = "🏠 家庭点菜清单：\n";
    let total = 0;
    for(let idx in cart){
        let num = cart[idx];
        if(num<=0) continue;
        let item = foodData[idx];
        let sum = item.price * num;
        total += sum;
        text += `${item.name} × ${num}  ¥${sum}\n`;
    }
    text += `\n合计总价：¥${total}`;
    return text;
}

// 复制清单发微信
function copyToWechat(){
    let text = getOrderText();
    // 复制到剪贴板
    navigator.clipboard.writeText(text).then(()=>{
        alert("✅ 已复制点菜清单！打开微信粘贴发送即可");
    }).catch(()=>{
        // 兼容低端手机
        alert("请手动复制以下内容：\n"+text);
    });
}

// 确认下单 保存到历史记录
function submitOrder(){
    let hasFood = false;
    for(let idx in cart){
        if(cart[idx]>0) hasFood = true;
    }
    if(!hasFood){
        alert("请先点菜再确认下单");
        return;
    }
    let time = new Date().toLocaleString();
    let record = {
        time: time,
        content: getOrderText()
    };
    orderRecord.unshift(record);
    // 保存到本地
    localStorage.setItem('familyOrderRecord',JSON.stringify(orderRecord));
    alert("✅ 下单成功！已保存到点菜记录");
    // 清空当前点菜
    cart = {};
    renderFood();
    renderOrder();
}

// 渲染历史记录
function renderRecord(){
    let html = "";
    if(orderRecord.length===0){
        html = "<div class='record-item'>暂无点菜记录</div>";
    }else{
        orderRecord.forEach((item,index)=>{
            html += `
            <div class="record-item">
                <div>🕒 ${item.time}</div>
                <div>${item.content}</div>
            </div>
            `;
        });
    }
    document.getElementById("recordList").innerHTML = html;
}

// 清空当前点菜
function clearCart(){
    cart = {};
    renderFood();
    renderOrder();
}

// 清空所有记录
function clearAllRecord(){
    if(confirm("确定要清空所有历史点菜记录吗？")){
        orderRecord = [];
        localStorage.removeItem('familyOrderRecord');
        renderRecord();
    }
}

// 初始化
renderFood();
renderOrder();
</script>
</body>
</html>
